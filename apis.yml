aid: basel-compliance
name: Basel Compliance
description: >-
  Basel Compliance covers the regulatory frameworks and technical standards issued by the
  Basel Committee on Banking Supervision (BCBS) at the Bank for International Settlements.
  The Basel Accords establish minimum capital adequacy, leverage, liquidity, and risk
  management requirements for internationally active banks. RegTech platforms provide APIs
  to automate Basel compliance calculations, reporting (COREP, FINREP), and supervisory
  submissions.
